spring.application.name=eventhall

# PostgreSQL connection
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui.html

# Business Properties
business.name=${BUSINESS_NAME:Event Hall Package Builder}
business.contact-email=${BUSINESS_CONTACT_EMAIL:contact@example.com}
business.contact-phone=${BUSINESS_CONTACT_PHONE:0500000000}

# Security / JWT
# JWT_SECRET MUST be overridden in production. The default below is dev-only and
# is at least 256 bits long so the HS256 algorithm can be used safely.
app.security.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-please-change-this-in-production-it-must-be-long-enough-for-hs256-32bytes-min-2026}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.security.jwt.issuer=${JWT_ISSUER:adama-event-hall}

# Default admin account seeded at startup if no admin exists
app.admin.default-email=${ADMIN_EMAIL:admin@adama.local}
app.admin.default-password=${ADMIN_PASSWORD:admin1234}
app.admin.default-full-name=${ADMIN_FULL_NAME:מנהל המערכת}