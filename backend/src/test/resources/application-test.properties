spring.datasource.url=jdbc:h2:mem:eventhall_test_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.open-in-view=false

# Test-mode security configuration
app.security.jwt.secret=test-only-jwt-secret-must-be-long-enough-for-hs256-32bytes-minimum-1234567890
app.security.jwt.expiration-minutes=60
app.security.jwt.issuer=adama-event-hall-test
app.admin.default-email=admin@adama.local
app.admin.default-password=admin1234
app.admin.default-full-name=Test Admin